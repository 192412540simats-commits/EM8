<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Environmental Monitoring</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root {
  --amber: #ff9f0a;
  --green: #30d158;
  --blue:  #0a84ff;
  --red:   #ff453a;
  --purple:#bf5af2;
}

body {
  min-height: 100vh;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #060612;
  color: #fff;
  overflow-x: hidden;
}

canvas#bg { position:fixed; inset:0; width:100%; height:100%; z-index:0; }

.page {
  position: relative;
  z-index: 1;
  max-width: 460px;
  margin: 0 auto;
  padding: 52px 20px 60px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── HEADER ── */
.header { text-align:center; margin-bottom:8px; }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(48,209,88,.1);
  border: 1px solid rgba(48,209,88,.3);
  border-radius: 50px;
  padding: 5px 14px 5px 9px;
  margin-bottom: 18px;
}
.status-pill .dot {
  width:7px; height:7px;
  border-radius:50%;
  background: var(--green);
  box-shadow: 0 0 10px rgba(48,209,88,.9);
  animation: blink 2s ease-in-out infinite;
}
.status-pill span { font-size:11px; font-weight:600; color:rgba(48,209,88,.85); letter-spacing:.08em; text-transform:uppercase; }

@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.4;} }

.header h1 {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
  background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,.45));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p { font-size:13px; color:rgba(255,255,255,.35); margin-top:6px; letter-spacing:.01em; }

/* ── GLASS BASE ── */
.gcard {
  background: rgba(255,255,255,.055);
  border: 1px solid rgba(255,255,255,.12);
  border-top-color: rgba(255,255,255,.22);
  border-radius: 30px;
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  position: relative;
  overflow: hidden;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), border-color .3s;
  padding: 26px 26px 22px;
}
.gcard:hover { transform: translateY(-4px) scale(1.008); border-color:rgba(255,255,255,.2); }

/* inner shine */
.gcard::before {
  content:'';
  position:absolute;
  top:0; left:12%; right:12%;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
}

/* inner specular blob */
.gcard::after {
  content:'';
  position:absolute;
  width:200px; height:200px;
  border-radius:50%;
  filter:blur(50px);
  opacity:.1;
  pointer-events:none;
  top:-40px; right:-40px;
}
.ct::after { background:var(--amber); }
.ch::after { background:var(--green); top:-40px; left:-40px; right:auto; }
.ci::after { background:var(--blue); }

/* ── CARD HEADER ROW ── */
.crow { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }

.clabel {
  font-size:11px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  color:rgba(255,255,255,.38);
  margin-bottom:6px;
}

/* icon bubbles */
.cicon {
  width:52px; height:52px;
  border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
  flex-shrink:0;
  position:relative;
}
.cicon::before {
  content:'';
  position:absolute; inset:0;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
}
.it { background: rgba(255,159,10,.18); box-shadow: inset 0 1px 0 rgba(255,200,80,.25), 0 0 24px rgba(255,159,10,.15); }
.ih { background: rgba(48,209,88,.15);  box-shadow: inset 0 1px 0 rgba(100,255,150,.2),  0 0 24px rgba(48,209,88,.12); }
.ii { background: rgba(10,132,255,.18); box-shadow: inset 0 1px 0 rgba(80,160,255,.25), 0 0 24px rgba(10,132,255,.15); }

/* big value */
.cval {
  font-size:54px;
  font-weight:800;
  letter-spacing:-3px;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.vt { color:var(--amber); text-shadow: 0 0 40px rgba(255,159,10,.4); }
.vh { color:var(--green);  text-shadow: 0 0 40px rgba(48,209,88,.4); }
.vi { color:var(--blue);   text-shadow: 0 0 40px rgba(10,132,255,.4); }

.cunit {
  font-size:20px; font-weight:400;
  opacity:.5; letter-spacing:0;
  margin-left:2px;
}

/* ── ARC GAUGE ── */
.gauge-wrap { display:flex; justify-content:center; margin:14px 0 10px; }
.gauge-svg { overflow:visible; }

/* ── HORIZONTAL METER ── */
.meter-row { display:flex; align-items:center; gap:10px; margin-top:18px; }
.meter-track {
  flex:1; height:5px;
  background:rgba(255,255,255,.08);
  border-radius:10px; overflow:hidden;
  position:relative;
}
.meter-fill {
  height:100%; border-radius:10px;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
  width:0%;
  position:relative;
}
.mft { background:linear-gradient(90deg,#ff6b00,var(--amber)); box-shadow:0 0 10px rgba(255,159,10,.5); }
.mfh { background:linear-gradient(90deg,#00a832,var(--green));  box-shadow:0 0 10px rgba(48,209,88,.5); }
.meter-pct { font-size:11px; font-weight:600; color:rgba(255,255,255,.35); min-width:32px; text-align:right; }

/* ── SPARKLINE ── */
.spark-wrap { margin-top:14px; }
.spark-label-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.spark-label { font-size:10px; color:rgba(255,255,255,.28); letter-spacing:.06em; text-transform:uppercase; }
.spark-svg { width:100%; display:block; }

/* ── IR CARD ── */
.ir-center { display:flex; flex-direction:column; align-items:center; padding:8px 0 4px; gap:14px; }
.ir-ring {
  width:100px; height:100px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  font-size:36px;
  transition:all .5s ease;
}
.ir-ring::before, .ir-ring::after {
  content:'';
  position:absolute; inset:-8px;
  border-radius:50%;
  border:1px solid;
  animation: ripple 2.5s ease-out infinite;
  opacity:0;
}
.ir-ring::after { animation-delay:1.2s; }

.ir-detected .ir-ring { background:rgba(10,132,255,.2); box-shadow:0 0 60px rgba(10,132,255,.35); }
.ir-detected .ir-ring::before, .ir-detected .ir-ring::after { border-color:rgba(10,132,255,.6); }
.ir-clear .ir-ring { background:rgba(255,255,255,.06); box-shadow:none; }
.ir-clear .ir-ring::before, .ir-clear .ir-ring::after { display:none; }

@keyframes ripple {
  0%   { transform:scale(1);   opacity:.7; }
  100% { transform:scale(1.6); opacity:0; }
}

.ir-badge {
  display:inline-flex; align-items:center; gap:8px;
  padding:9px 20px; border-radius:50px;
  font-size:15px; font-weight:700; letter-spacing:-.2px;
  transition:all .4s ease;
}
.badge-dot { width:8px; height:8px; border-radius:50%; transition:all .4s; }
.ir-detected .ir-badge {
  background:rgba(10,132,255,.2);
  border:1px solid rgba(10,132,255,.45);
  color:#58b1ff;
}
.ir-detected .badge-dot { background:var(--blue); box-shadow:0 0 10px rgba(10,132,255,.9); animation:blink 1.4s ease-in-out infinite; }
.ir-clear .ir-badge {
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.35);
}
.ir-clear .badge-dot { background:rgba(255,255,255,.25); }

.ir-sub { font-size:12px; color:rgba(255,255,255,.28); text-align:center; }

/* ── BOTTOM GRID ── */
.bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:2px; }
.bcard {
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-top-color:rgba(255,255,255,.16);
  border-radius:20px;
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  padding:16px 18px;
  display:flex; flex-direction:column; gap:4px;
}
.bcard-label { font-size:10px; font-weight:600; color:rgba(255,255,255,.3); letter-spacing:.08em; text-transform:uppercase; }
.bcard-val { font-size:18px; font-weight:700; color:rgba(255,255,255,.8); }

/* ── LOADING ── */
@keyframes shimmer { 0%{background-position:-300px 0;} 100%{background-position:300px 0;} }
.loading {
  background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.04) 100%);
  background-size: 600px 100%;
  animation: shimmer 1.6s infinite;
  border-radius:8px;
  color:transparent !important;
  display:inline-block;
  min-width:70px;
  text-shadow:none !important;
}

/* time bar */
.timebar { display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
.timebar-label { font-size:10px; color:rgba(255,255,255,.25); letter-spacing:.04em; }
.timebar-dots { display:flex; gap:4px; }
.timebar-dots span {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,255,255,.12);
  transition: background .4s;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="status-pill">
      <div class="dot"></div>
      <span>Live Feed</span>
    </div>
    <h1>Environmental<br>Monitor</h1>
    <p>Sensor array · Real-time data</p>
  </div>

  <!-- TEMPERATURE CARD -->
  <div class="gcard ct">
    <div class="crow">
      <div>
        <div class="clabel">Temperature</div>
        <div class="cval vt">
          <span id="temp" class="loading">--</span><span class="cunit" id="t-unit" style="display:none">°C</span>
        </div>
      </div>
      <div class="cicon it">🌡️</div>
    </div>

    <div class="gauge-wrap">
      <svg class="gauge-svg" width="200" height="108" viewBox="0 0 200 108">
        <defs>
          <linearGradient id="gtemp" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff6b00"/>
            <stop offset="100%" stop-color="#ffcc00"/>
          </linearGradient>
        </defs>
        <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10" stroke-linecap="round"/>
        <path id="t-arc" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="url(#gtemp)" stroke-width="10" stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251" style="transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);"/>
        <text x="100" y="86" text-anchor="middle" fill="rgba(255,255,255,.25)" font-size="10" font-family="Inter" font-weight="500" letter-spacing=".06em">0°C</text>
        <text x="100" y="86" text-anchor="middle" fill="rgba(255,255,255,.25)" font-size="10" font-family="Inter" font-weight="500" letter-spacing=".06em" transform="translate(-80,0)"></text>
        <text x="18"  y="106" text-anchor="middle" fill="rgba(255,255,255,.22)" font-size="10" font-family="Inter">0</text>
        <text x="182" y="106" text-anchor="middle" fill="rgba(255,255,255,.22)" font-size="10" font-family="Inter">50</text>
      </svg>
    </div>

    <div class="meter-row">
      <div class="meter-track"><div class="meter-fill mft" id="t-bar"></div></div>
      <div class="meter-pct" id="t-pct">--%</div>
    </div>
    <div class="timebar">
      <span class="timebar-label" id="t-desc">Connecting…</span>
      <div class="timebar-dots" id="t-dots">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- HUMIDITY CARD -->
  <div class="gcard ch">
    <div class="crow">
      <div>
        <div class="clabel">Humidity</div>
        <div class="cval vh">
          <span id="hum" class="loading">--</span><span class="cunit" id="h-unit" style="display:none">%</span>
        </div>
      </div>
      <div class="cicon ih">💧</div>
    </div>

    <div class="spark-wrap">
      <div class="spark-label-row">
        <span class="spark-label">History</span>
        <span class="spark-label" id="h-trend">—</span>
      </div>
      <svg class="spark-svg" id="spark-svg" viewBox="0 0 380 60" height="60" preserveAspectRatio="none">
        <defs>
          <linearGradient id="sparkg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(48,209,88,.35)"/>
            <stop offset="100%" stop-color="rgba(48,209,88,0)"/>
          </linearGradient>
        </defs>
        <path id="spark-area" d="" fill="url(#sparkg)"/>
        <path id="spark-line" d="" fill="none" stroke="rgba(48,209,88,.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="meter-row">
      <div class="meter-track"><div class="meter-fill mfh" id="h-bar"></div></div>
      <div class="meter-pct" id="h-pct">--%</div>
    </div>
    <div class="timebar">
      <span class="timebar-label" id="h-desc">Connecting…</span>
    </div>
  </div>

  <!-- IR CARD -->
  <div class="gcard ci" id="ir-card">
    <div class="crow">
      <div>
        <div class="clabel">Object Detection</div>
      </div>
      <div class="cicon ii">👁️</div>
    </div>
    <div class="ir-center ir-clear" id="ir-state">
      <div class="ir-ring" id="ir-ring">👁️</div>
      <div class="ir-badge">
        <span class="badge-dot"></span>
        <span id="ir">Waiting…</span>
      </div>
      <div class="ir-sub" id="ir-sub">Sensor initializing</div>
    </div>
  </div>

  <!-- BOTTOM STAT GRID -->
  <div class="bottom-grid">
    <div class="bcard">
      <div class="bcard-label">Heat Index</div>
      <div class="bcard-val" id="hi-val">--</div>
    </div>
    <div class="bcard">
      <div class="bcard-label">Dew Point</div>
      <div class="bcard-val" id="dp-val">--</div>
    </div>
    <div class="bcard">
      <div class="bcard-label">Comfort</div>
      <div class="bcard-val" id="cf-val">--</div>
    </div>
    <div class="bcard">
      <div class="bcard-label">Air Quality Est.</div>
      <div class="bcard-val" id="aq-val">--</div>
    </div>
  </div>

</div>

<script>
/* ── ANIMATED CANVAS BACKGROUND ── */
(function(){
  const c=document.getElementById('bg');
  const cx=c.getContext('2d');
  let W,H;
  const orbs=[
    {x:.15,y:.1,r:.38,c:'120,60,255',sp:.0003,off:0},
    {x:.85,y:.15,r:.32,c:'0,160,255',sp:.0004,off:2},
    {x:.5, y:.7, r:.30,c:'0,210,130',sp:.00035,off:4},
    {x:.2, y:.8, r:.22,c:'200,50,200',sp:.0005,off:6},
  ];
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  let t=0;
  function frame(){
    t+=1;
    cx.clearRect(0,0,W,H);
    orbs.forEach(o=>{
      const ox=W*(o.x+.06*Math.sin(t*o.sp+o.off));
      const oy=H*(o.y+.05*Math.cos(t*o.sp+o.off+1));
      const r=Math.min(W,H)*o.r;
      const g=cx.createRadialGradient(ox,oy,0,ox,oy,r);
      g.addColorStop(0,`rgba(${o.c},.28)`);
      g.addColorStop(1,`rgba(${o.c},0)`);
      cx.fillStyle=g;
      cx.beginPath(); cx.arc(ox,oy,r,0,Math.PI*2); cx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ── SPARKLINE DATA ── */
const humHistory=[];
const MAX_HIST=20;

function pushHist(v){
  humHistory.push(v);
  if(humHistory.length>MAX_HIST) humHistory.shift();
  drawSparkline();
}

function drawSparkline(){
  if(humHistory.length<2) return;
  const svg=document.getElementById('spark-svg');
  const W=380, H=60, pad=4;
  const mn=Math.min(...humHistory)-5, mx=Math.max(...humHistory)+5;
  const pts=humHistory.map((v,i)=>{
    const x=pad+(i/(humHistory.length-1))*(W-pad*2);
    const y=H-pad-(v-mn)/(mx-mn)*(H-pad*2);
    return [x,y];
  });
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area=line+' L'+pts[pts.length-1][0].toFixed(1)+','+H+' L'+pts[0][0].toFixed(1)+','+H+' Z';
  document.getElementById('spark-line').setAttribute('d',line);
  document.getElementById('spark-area').setAttribute('d',area);
  const last=humHistory[humHistory.length-1];
  const prev=humHistory[humHistory.length-2];
  const t=document.getElementById('h-trend');
  if(last>prev) t.textContent='↑ Rising'; 
  else if(last<prev) t.textContent='↓ Falling'; 
  else t.textContent='→ Stable';
}

/* ── ARC GAUGE (temp) ── */
function updateArc(pct){
  const total=251;
  const offset=total-(total*Math.min(Math.max(pct,0),1));
  document.getElementById('t-arc').style.strokeDashoffset=offset;
}

/* ── COMFORT / DERIVED METRICS ── */
let lastT=null, lastH=null;

function updateDerived(){
  if(lastT===null||lastH===null) return;
  const T=lastT, H=lastH;

  /* Simplified heat index (Rothfusz) */
  const hi=-8.78469475556
    +1.61139411*T
    +2.33854883889*H
    -0.14611605*T*H
    -0.012308094*T*T
    -0.0164248277778*H*H
    +0.002211732*T*T*H
    +0.00072546*T*H*H
    -0.000003582*T*T*H*H;
  document.getElementById('hi-val').textContent=Math.round(hi)+'°C';

  /* Dew point (Magnus formula) */
  const dp=243.04*(Math.log(H/100)+17.625*T/(243.04+T))/(17.625-Math.log(H/100)-17.625*T/(243.04+T));
  document.getElementById('dp-val').textContent=Math.round(dp)+'°C';

  /* Comfort index */
  let cf='—';
  if(T>=20&&T<=26&&H>=40&&H<=60) cf='Optimal';
  else if(T<10||T>35||H<20||H>80) cf='Poor';
  else if(T<16||T>30||H<30||H>70) cf='Fair';
  else cf='Good';
  document.getElementById('cf-val').textContent=cf;

  /* Air quality estimate from humidity */
  let aq='—';
  if(H<30) aq='Dry';
  else if(H<60) aq='Good';
  else if(H<80) aq='Moderate';
  else aq='Humid';
  document.getElementById('aq-val').textContent=aq;
}

/* ── HEAT DOT TRAIL ── */
function updateDots(pct){
  const dots=document.querySelectorAll('#t-dots span');
  const filled=Math.round(pct*dots.length);
  dots.forEach((d,i)=>{
    d.style.background=i<filled?'rgba(255,159,10,.7)':'rgba(255,255,255,.12)';
    d.style.boxShadow=i<filled?'0 0 6px rgba(255,159,10,.6)':'none';
  });
}

function tempDesc(v){
  if(v<10) return 'Cold conditions';
  if(v<18) return 'Cool range';
  if(v<24) return 'Comfortable';
  if(v<30) return 'Warm conditions';
  if(v<37) return 'Hot — stay hydrated';
  return 'Extreme heat warning';
}
function humDesc(v){
  if(v<20) return 'Very dry — low humidity';
  if(v<40) return 'Dry conditions';
  if(v<60) return 'Ideal humidity';
  if(v<75) return 'Moderately humid';
  return 'High humidity';
}

/* ── FIREBASE ── */
const firebaseConfig={
  apiKey:"AIzaSyDcsf6uixmJ0tjK1aVRfw6jEOk23_LcD_Y",
  databaseURL:"https://enivironmental-monitoring-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();

db.ref("temperature").on("value",(snap)=>{
  const v=snap.val();
  const el=document.getElementById('temp');
  el.classList.remove('loading'); el.textContent=v;
  document.getElementById('t-unit').style.display='inline';
  const pct=Math.min(Math.max(v/50,0),1);
  document.getElementById('t-bar').style.width=(pct*100).toFixed(1)+'%';
  document.getElementById('t-pct').textContent=Math.round(pct*100)+'%';
  document.getElementById('t-desc').textContent=tempDesc(v);
  updateArc(pct);
  updateDots(pct);
  lastT=v; updateDerived();
});

db.ref("humidity").on("value",(snap)=>{
  const v=snap.val();
  const el=document.getElementById('hum');
  el.classList.remove('loading'); el.textContent=v;
  document.getElementById('h-unit').style.display='inline';
  const pct=Math.min(Math.max(v/100,0),1);
  document.getElementById('h-bar').style.width=(pct*100).toFixed(1)+'%';
  document.getElementById('h-pct').textContent=Math.round(pct*100)+'%';
  document.getElementById('h-desc').textContent=humDesc(v);
  pushHist(v);
  lastH=v; updateDerived();
});

db.ref("objectDetected").on("value",(snap)=>{
  const det=snap.val();
  const state=document.getElementById('ir-state');
  const ring=document.getElementById('ir-ring');
  const lbl=document.getElementById('ir');
  const sub=document.getElementById('ir-sub');
  lbl.classList.remove('loading');
  if(det){
    state.className='ir-center ir-detected';
    ring.textContent='👁️';
    lbl.textContent='Detected';
    sub.textContent='Object within sensor range';
  } else {
    state.className='ir-center ir-clear';
    ring.textContent='👁️';
    lbl.textContent='Not Detected';
    sub.textContent='No object in range';
  }
});
</script>
</body>
</html>
